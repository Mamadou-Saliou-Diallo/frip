<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friperie - Achetez & Vendez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-emerald-50 via-teal-50 to-cyan-50">
    
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-gradient-to-br from-emerald-500 to-teal-600 p-2 rounded-xl">
                        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">Friperie</h1>
                        <p class="text-sm text-gray-500">Achetez & Vendez</p>
                    </div>
                </div>
                <button onclick="toggleForm()" class="bg-gradient-to-r from-emerald-500 to-teal-600 text-white px-6 py-2 rounded-xl font-semibold hover:shadow-lg transition-all flex items-center space-x-2">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    <span>Vendre</span>
                </button>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-8">
        
        <!-- Add Item Form -->
        <div id="formContainer" class="bg-white rounded-2xl shadow-xl p-6 mb-8 border border-emerald-100 hidden">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-gray-900">📤 Ajouter un article</h2>
                <button onclick="toggleForm()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <form id="itemForm" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Titre *</label>
                        <input type="text" id="title" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent" placeholder="Ex: Chemise vintage" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Prix (FCFA) *</label>
                        <input type="number" id="price" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent" placeholder="Ex: 5000" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Catégorie *</label>
                        <select id="category" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent" required>
                            <option value="vêtements">👕 Vêtements</option>
                            <option value="chaussures">👟 Chaussures</option>
                            <option value="accessoires">👜 Accessoires</option>
                            <option value="bébé">👶 Bébé/Enfant</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Image *</label>
                        <input type="file" id="image" accept="image/*" onchange="previewImage(event)" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent" required>
                        <div id="imagePreview" class="mt-2 hidden">
                            <img id="previewImg" src="" alt="Preview" class="h-20 rounded-lg object-cover">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nom du vendeur</label>
                        <input type="text" id="sellerName" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent" placeholder="Votre nom">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Téléphone</label>
                        <input type="tel" id="sellerPhone" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent" placeholder="Ex: 690000000">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea id="description" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent" rows="3" placeholder="Décrivez l'état, la taille, etc."></textarea>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white py-4 rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    ✅ Publier l'article
                </button>
            </form>
        </div>

        <!-- Search and Filter -->
        <div class="mb-8 space-y-4">
            <div class="relative">
                <svg class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" id="searchInput" oninput="filterItems()" placeholder="🔍 Rechercher un article..." class="w-full pl-12 pr-4 py-4 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent shadow-sm">
            </div>

            <div id="categoryButtons" class="flex flex-wrap gap-2">
                <!-- Categories will be inserted here -->
            </div>
        </div>

        <!-- Items Grid -->
        <div id="itemsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Items will be inserted here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-16 hidden">
            <div class="bg-white rounded-2xl shadow-lg p-12">
                <svg class="w-24 h-24 text-gray-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                </svg>
                <h3 class="text-xl font-semibold text-gray-700 mb-2">Aucun article trouvé</h3>
                <p class="text-gray-500 mb-6">Soyez le premier à ajouter un article !</p>
                <button onclick="toggleForm()" class="bg-gradient-to-r from-emerald-500 to-teal-600 text-white px-6 py-3 rounded-xl font-semibold hover:shadow-lg transition-all">
                    Ajouter un article
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div id="statsSection" class="mt-12 bg-white rounded-2xl shadow-lg p-6 hidden">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">📊 Statistiques</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="text-center p-4 bg-emerald-50 rounded-xl">
                    <div id="statArticles" class="text-3xl font-bold text-emerald-600">0</div>
                    <div class="text-sm text-gray-600">Articles</div>
                </div>
                <div class="text-center p-4 bg-blue-50 rounded-xl">
                    <div id="statVendeurs" class="text-3xl font-bold text-blue-600">0</div>
                    <div class="text-sm text-gray-600">Vendeurs</div>
                </div>
                <div class="text-center p-4 bg-purple-50 rounded-xl">
                    <div id="statValeur" class="text-3xl font-bold text-purple-600">0k</div>
                    <div class="text-sm text-gray-600">Valeur totale</div>
                </div>
                <div class="text-center p-4 bg-orange-50 rounded-xl">
                    <div id="statCategories" class="text-3xl font-bold text-orange-600">0</div>
                    <div class="text-sm text-gray-600">Catégories</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="container mx-auto px-4 py-8">
            <div class="text-center">
                <p class="text-gray-600 mb-2">© 2026 Friperie - Plateforme d'achat et vente</p>
                <p class="text-sm text-gray-500">Construit avec Saliou ❤️ pour faciliter le commerce local</p>
            </div>
        </div>
    </footer>

    <script>
        // Data
        let items = JSON.parse(localStorage.getItem('items') || '[]');
        let selectedCategory = 'all';
        let currentImageUrl = '';

        const categories = [
            { id: 'all', label: 'Tout', icon: '🛍️' },
            { id: 'vêtements', label: 'Vêtements', icon: '👕' },
            { id: 'chaussures', label: 'Chaussures', icon: '👟' },
            { id: 'accessoires', label: 'Accessoires', icon: '👜' },
            { id: 'bébé', label: 'Bébé/Enfant', icon: '👶' }
        ];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            renderCategories();
            renderItems();
            updateStats();
            
            document.getElementById('itemForm').addEventListener('submit', handleSubmit);
        });

        // Toggle form visibility
        function toggleForm() {
            const form = document.getElementById('formContainer');
            form.classList.toggle('hidden');
        }

        // Preview image
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageUrl = e.target.result;
                    document.getElementById('previewImg').src = currentImageUrl;
                    document.getElementById('imagePreview').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        // Handle form submission
        function handleSubmit(e) {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;
            const category = document.getElementById('category').value;
            const sellerName = document.getElementById('sellerName').value;
            const sellerPhone = document.getElementById('sellerPhone').value;
            const description = document.getElementById('description').value;

            if (!title || !price || !currentImageUrl) {
                alert('Veuillez remplir tous les champs obligatoires');
                return;
            }

            const newItem = {
                id: Date.now(),
                title: title,
                price: price,
                description: description,
                sellerName: sellerName,
                sellerPhone: sellerPhone,
                category: category,
                imageUrl: currentImageUrl,
                createdAt: new Date().toISOString()
            };

            items.unshift(newItem);
            saveItems();
            renderItems();
            updateStats();
            
            // Reset form
            document.getElementById('itemForm').reset();
            document.getElementById('imagePreview').classList.add('hidden');
            currentImageUrl = '';
            toggleForm();
        }

        // Save items to localStorage
        function saveItems() {
            localStorage.setItem('items', JSON.stringify(items));
        }

        // Render category buttons
        function renderCategories() {
            const container = document.getElementById('categoryButtons');
            container.innerHTML = categories.map(cat => `
                <button onclick="selectCategory('${cat.id}')" 
                    class="category-btn px-4 py-2 rounded-xl font-medium transition-all ${
                        selectedCategory === cat.id
                            ? 'bg-gradient-to-r from-emerald-500 to-teal-600 text-white shadow-lg'
                            : 'bg-white text-gray-700 hover:bg-gray-50 border border-gray-200'
                    }" data-category="${cat.id}">
                    ${cat.icon} ${cat.label}
                </button>
            `).join('');
        }

        // Select category
        function selectCategory(categoryId) {
            selectedCategory = categoryId;
            renderCategories();
            filterItems();
        }

        // Filter and render items
        function filterItems() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = items.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(search);
                const matchesCategory = selectedCategory === 'all' || item.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            renderFilteredItems(filtered);
        }

        // Render items
        function renderItems() {
            filterItems();
        }

        // Render filtered items
        function renderFilteredItems(filteredItems) {
            const grid = document.getElementById('itemsGrid');
            const emptyState = document.getElementById('emptyState');

            if (filteredItems.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            grid.innerHTML = filteredItems.map(item => {
                const categoryIcon = categories.find(c => c.id === item.category)?.icon || '🛍️';
                
                return `
                    <div class="bg-white rounded-2xl shadow-lg overflow-hidden hover:shadow-xl transition-all group">
                        <div class="relative">
                            <img src="${item.imageUrl}" alt="${item.title}" 
                                class="w-full h-64 object-cover group-hover:scale-105 transition-transform duration-300">
                            <div class="absolute top-3 right-3">
                                <span class="bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-sm font-semibold text-gray-700">
                                    ${categoryIcon}
                                </span>
                            </div>
                            <button onclick="deleteItem(${item.id})" 
                                class="absolute top-3 left-3 bg-red-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-600">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>

                        <div class="p-4">
                            <h3 class="font-bold text-gray-900 mb-1 line-clamp-2">${item.title}</h3>
                            <p class="text-2xl font-bold text-emerald-600 mb-2">${item.price} FCFA</p>
                            
                            ${item.description ? `<p class="text-sm text-gray-500 mb-3 line-clamp-2">${item.description}</p>` : ''}
                            
                            ${item.sellerName ? `<p class="text-sm text-gray-600 mb-3">📤 <span class="font-medium">${item.sellerName}</span></p>` : ''}

                            <button onclick="contactWhatsApp(${item.id})" 
                                class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition-all flex items-center justify-center space-x-2">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                                </svg>
                                <span>Contact WhatsApp</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Delete item
        function deleteItem(id) {
            if (confirm('Voulez-vous vraiment supprimer cet article ?')) {
                items = items.filter(item => item.id !== id);
                saveItems();
                renderItems();
                updateStats();
            }
        }

        // Contact via WhatsApp
        function contactWhatsApp(id) {
            const item = items.find(i => i.id === id);
            if (item) {
                const message = `Bonjour, je suis intéressé par votre article: ${item.title} à ${item.price} FCFA. Contactez-moi au ${item.sellerPhone || 'votre numéro'}.`;
                const encodedMessage = encodeURIComponent(message);
                window.open(`https://wa.me/?text=${encodedMessage}`, '_blank');
            }
        }

        // Update statistics
        function updateStats() {
            const statsSection = document.getElementById('statsSection');
            
            if (items.length === 0) {
                statsSection.classList.add('hidden');
                return;
            }

            statsSection.classList.remove('hidden');
            
            document.getElementById('statArticles').textContent = items.length;
            
            const uniqueSellers = new Set(items.map(i => i.sellerName).filter(n => n)).size;
            document.getElementById('statVendeurs').textContent = uniqueSellers;
            
            const totalValue = items.reduce((sum, i) => sum + Number(i.price), 0);
            document.getElementById('statValeur').textContent = Math.round(totalValue / 1000) + 'k';
            
            const activeCategories = categories.filter(c => 
                c.id !== 'all' && items.some(i => i.category === c.id)
            ).length;
            document.getElementById('statCategories').textContent = activeCategories;
        }
    </script>
</body>
</html>
